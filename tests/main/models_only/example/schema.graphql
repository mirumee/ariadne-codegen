schema {
  query: Query
  mutation: Mutation
}

type Query {
  users(country: String): [User!]!
}

type Mutation {
  userCreate(userData: UserCreateInput!): User
}

input UserCreateInput {
  firstName: String
  lastName: String
  email: String!
  favouriteColor: Color
}

type User {
  id: ID!
  firstName: String
  lastName: String
  email: String!
  favouriteColor: Color
}

enum Color {
  BLACK
  WHITE
  RED
  GREEN
  BLUE
}
