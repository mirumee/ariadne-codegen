name: Prepare release

on:
  push:
    tags:
      - "*"
  workflow_call:
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  build:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write # IMPORTANT: mandatory for sigstore in build.yml

  create-release:
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine release notes options
        id: relopts
        run: |
          # Pre-release tags (e.g. 0.19.a1, 0.19.rc1) are excluded from cliff.toml's
          # tag_pattern, so `--latest` would resolve to the previous stable tag. For
          # those, generate notes for the unreleased range and label them with the tag.
          if [[ "${{ github.ref_name }}" =~ (a|b|rc|alpha|beta|dev)[0-9]*$ ]]; then
            echo "args=--unreleased --tag ${{ github.ref_name }} --strip all" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "args=--latest --strip all" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate release notes
        id: release-notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ steps.relopts.outputs.args }}
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Release
        id: create-draft-release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/*
          draft: true
          prerelease: ${{ steps.relopts.outputs.prerelease }}
          body_path: RELEASE_NOTES.md
      - name: Summary
        run: |
          echo "# Release summary" >> $GITHUB_STEP_SUMMARY
          echo "Url: ${{ steps.create-draft-release.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "You can now publish the release on GitHub" >> $GITHUB_STEP_SUMMARY
